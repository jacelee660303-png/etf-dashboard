<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--card:#fff;--bd:rgba(0,0,0,0.09);--tx:#1a1a1a;--t2:#666;--t3:#999;--acc:#1e40af;--mono:'SF Mono','Courier New',monospace}
body{font-family:-apple-system,'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:28px 22px}
.wrap{max-width:1000px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.hdr h1{font-size:20px;font-weight:600}.hdr p{font-size:12px;color:var(--t2);font-family:var(--mono);margin-top:3px}
.hdr-r{display:flex;align-items:center;gap:8px}
button{padding:7px 13px;border:1px solid var(--bd);border-radius:7px;background:var(--card);color:var(--tx);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s}
button:hover{background:#eeecea}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-family:var(--mono)}
.b-live{background:#dcfce7;color:#16a34a}.b-cache{background:#eff6ff;color:#2563eb}.b-load{background:#fef9c3;color:#ca8a04}.b-err{background:#fee2e2;color:#dc2626}
.info-bar{display:flex;justify-content:space-between;padding:8px 13px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;font-size:12px;color:var(--acc);margin-bottom:10px}
.upd-bar{display:flex;justify-content:space-between;padding:8px 13px;background:#f3f4f6;border-radius:7px;font-size:11px;color:var(--t2);font-family:var(--mono);margin-bottom:14px}
.summary-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.scard{background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;border-top:3px solid #ddd}
.scard-name{font-size:11px;font-weight:600;color:var(--t2);font-family:var(--mono);margin-bottom:3px}
.scard-6m{font-size:18px;font-weight:700;font-family:var(--mono)}
.scard-rows{margin-top:4px;display:flex;flex-direction:column;gap:1px}
.scard-row{font-size:10px;color:var(--t3);display:flex;justify-content:space-between}
.scard-row span:last-child{font-weight:600}
.ch-card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:14px}
.ch-title{font-size:12px;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ch-badge{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700}
.main-badge{background:var(--acc);color:#fff}.ref-badge{background:#f3f4f6;color:var(--t2)}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--t2);margin-top:10px}
.tbl-wrap{background:var(--card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:8px 10px;font-size:10px;color:var(--t3);font-weight:500;background:#fafaf8;border-bottom:1px solid var(--bd);text-align:left}
th.r{text-align:right}th.key{color:var(--acc);font-weight:700;font-size:11px}
td{padding:9px 10px;font-size:12px;border-bottom:1px solid #f0f0ec}
td.r{text-align:right;font-family:var(--mono);font-size:12px;font-weight:600}
td.key{background:#eff6ff}
tr:last-child td{border-bottom:none}tr:hover td{background:#fafaf8}tr:hover td.key{background:#dbeafe}
.rk{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;font-size:10px;font-family:var(--mono);font-weight:700;background:#f0f0ec;color:var(--t2)}
.r1{background:#fef3c7;color:#92400e}.r2{background:#f3f4f6;color:#4b5563}.r3{background:#fde8d8;color:#7c2d12}
#loadBox{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:50px 20px;text-align:center;color:var(--t2)}
.spin{width:28px;height:28px;border:2.5px solid #e5e7eb;border-top-color:var(--acc);border-radius:50%;animation:rot .8s linear infinite;margin:0 auto 12px}
@keyframes rot{to{transform:rotate(360deg)}}
footer{font-size:10px;color:var(--t3);text-align:center;line-height:1.8;padding-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1>ETF Performance Dashboard</h1><p id="period">Loading...</p></div>
    <div class="hdr-r">
      <span class="badge b-load" id="badge">● Loading</span>
    </div>
  </div>
  <div class="info-bar">
    <span>📊 QQQ · EWY · GLD · IEF · TLT · SOXX &nbsp;|&nbsp; USD &nbsp;|&nbsp; Yahoo Finance</span>
    <span style="color:var(--t2)">매주 일요일 자동 업데이트</span>
  </div>
  <div class="upd-bar" id="updBar" style="display:none"><span id="nextTxt"></span><span id="lastTxt"></span></div>
  <div id="loadBox">
    <div class="spin"></div>
    <div style="font-size:13px">데이터 로딩 중...</div>
  </div>
  <div id="dash" style="display:none">
    <div class="summary-row" id="summaryRow"></div>
    <div class="ch-card">
      <div class="ch-title">
        <span class="ch-badge main-badge">MAIN</span>
        3M · <strong>6M★</strong> · 9M · 12M Return Comparison
        <span style="color:var(--t3);font-size:11px" id="mainPeriod"></span>
        <div style="margin-left:auto;display:flex;gap:10px;font-size:11px;color:var(--t2)">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#aaa;opacity:.4;margin-right:3px;vertical-align:middle"></span>3M</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#555;border:2px solid #333;margin-right:3px;vertical-align:middle"></span>6M★</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#aaa;opacity:.65;margin-right:3px;vertical-align:middle"></span>9M</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#aaa;opacity:.5;margin-right:3px;vertical-align:middle"></span>12M</span>
        </div>
      </div>
      <div style="position:relative;height:280px"><canvas id="chartMain"></canvas></div>
    </div>
    <div class="ch-card">
      <div class="ch-title">
        <span class="ch-badge ref-badge">TREND</span>
        12-Week Relative Performance
        <span style="color:var(--t3);font-size:11px">12주 전 = 100 기준 지수화</span>
      </div>
      <div style="position:relative;height:240px"><canvas id="chartTrend"></canvas></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="tbl-wrap"><table id="tbl"></table></div>
  </div>
  <footer id="foot"></footer>
</div>
<script>
const charts={};
const fmt  = r=>(r==null||isNaN(r))?'–':(r>=0?'+':'')+parseFloat(r).toFixed(1)+'%';
const fmtD = d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
const cc   = v=>(v==null||isNaN(v))?'#9ca3af':(v>=0?'#16a34a':'#dc2626');
const setBadge=(cls,t)=>{const b=document.getElementById('badge');b.className='badge '+cls;b.textContent='● '+t;};

function nextSunday(){const d=new Date();const n=d.getDay();d.setDate(d.getDate()+(n===0?7:7-n));d.setHours(0,0,0,0);return d;}

function render(d){
  const sorted=[...d.etfs].sort((a,b)=>{if(a.ret6m==null)return 1;if(b.ret6m==null)return-1;return b.ret6m-a.ret6m;});
  document.getElementById('period').textContent=`USD basis · 기준일: ${d.date}`;
  document.getElementById('mainPeriod').textContent=`기준일: ${d.date}`;

  document.getElementById('updBar').style.display='flex';
  document.getElementById('nextTxt').textContent='Next update: '+fmtD(nextSunday())+' (Sun, GitHub Actions)';
  document.getElementById('lastTxt').textContent='Data date: '+d.date;

  document.getElementById('summaryRow').innerHTML=d.etfs.map(e=>`
    <div class="scard" style="border-top-color:${e.color}">
      <div class="scard-name">${e.ticker}</div>
      <div class="scard-6m" style="color:${cc(e.ret6m)}">${fmt(e.ret6m)}</div>
      <div class="scard-rows">
        <div class="scard-row"><span>3M</span><span style="color:${cc(e.ret3m)}">${fmt(e.ret3m)}</span></div>
        <div class="scard-row"><span>9M</span><span style="color:${cc(e.ret9m)}">${fmt(e.ret9m)}</span></div>
        <div class="scard-row"><span>12M</span><span style="color:${cc(e.ret12m)}">${fmt(e.ret12m)}</span></div>
      </div>
    </div>`).join('');

  const clr=sorted.map(e=>e.color);
  if(charts.main)charts.main.destroy();
  charts.main=new Chart(document.getElementById('chartMain'),{
    type:'bar',
    data:{labels:sorted.map(e=>e.ticker),datasets:[
      {label:'3M', data:sorted.map(e=>e.ret3m !=null?parseFloat(e.ret3m .toFixed(1)):null),backgroundColor:clr.map(c=>c+'44'),borderColor:clr.map(c=>c+'88'),borderWidth:1,borderRadius:3,borderSkipped:false},
      {label:'6M★',data:sorted.map(e=>e.ret6m !=null?parseFloat(e.ret6m .toFixed(1)):null),backgroundColor:clr.map(c=>c+'dd'),borderColor:clr,borderWidth:2,borderRadius:4,borderSkipped:false},
      {label:'9M', data:sorted.map(e=>e.ret9m !=null?parseFloat(e.ret9m .toFixed(1)):null),backgroundColor:clr.map(c=>c+'88'),borderColor:clr.map(c=>c+'bb'),borderWidth:1,borderRadius:3,borderSkipped:false},
      {label:'12M',data:sorted.map(e=>e.ret12m!=null?parseFloat(e.ret12m.toFixed(1)):null),backgroundColor:clr.map(c=>c+'55'),borderColor:clr.map(c=>c+'99'),borderWidth:1,borderRadius:3,borderSkipped:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:12}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:v=>v+'%'}}}}
  });

  const xL=d.etfs[0]?.trend?.map(p=>p.date)||[];
  if(charts.trend)charts.trend.destroy();
  charts.trend=new Chart(document.getElementById('chartTrend'),{
    type:'line',
    data:{labels:xL,datasets:d.etfs.map(e=>({
      label:e.ticker,data:e.trend.map(p=>p.idx),
      borderColor:e.color,backgroundColor:e.color+'18',borderWidth:2.5,pointRadius:3,pointHoverRadius:5,tension:0.3,fill:false
    }))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw!=null?c.raw.toFixed(1):'–'}`}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:30,autoSkip:true,maxTicksLimit:8}},
              y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:v=>v.toFixed(0)},title:{display:true,text:'Index (start=100)',font:{size:10},color:'#9ca3af'}}}}
  });

  document.getElementById('legend').innerHTML=d.etfs.map(e=>
    `<span><span style="display:inline-block;width:22px;height:3px;border-radius:2px;background:${e.color};margin-right:4px;vertical-align:middle"></span>${e.ticker}</span>`
  ).join('');

  const rk=['r1','r2','r3','','','',''];
  document.getElementById('tbl').innerHTML=`
    <thead><tr>
      <th style="width:32px">#</th><th style="width:58px">Ticker</th><th>Name</th>
      <th class="r key" style="width:80px">6M ★</th>
      <th class="r" style="width:70px">3M</th>
      <th class="r" style="width:70px">9M</th>
      <th class="r" style="width:70px">12M</th>
      <th class="r" style="width:82px">Current</th>
      <th class="r" style="width:82px">6M Ago</th>
    </tr></thead>
    <tbody>${sorted.map((e,i)=>`<tr>
      <td><span class="rk ${rk[i]}">${i+1}</span></td>
      <td style="font-weight:600;font-family:var(--mono)">${e.ticker}</td>
      <td style="font-size:11px;color:var(--t2)">${e.name}</td>
      <td class="r key" style="color:${cc(e.ret6m)}">${fmt(e.ret6m)}</td>
      <td class="r" style="color:${cc(e.ret3m)}">${fmt(e.ret3m)}</td>
      <td class="r" style="color:${cc(e.ret9m)}">${fmt(e.ret9m)}</td>
      <td class="r" style="color:${cc(e.ret12m)}">${fmt(e.ret12m)}</td>
      <td class="r" style="color:var(--t2)">${e.cur!=null?'$'+e.cur.toFixed(2):'–'}</td>
      <td class="r" style="color:var(--t2)">${e.prev6m!=null?'$'+e.prev6m.toFixed(2):'–'}</td>
    </tr>`).join('')}</tbody>`;

  document.getElementById('foot').innerHTML=
    `Source: Yahoo Finance · USD · ${d.date} · 12-week trend indexed to 100<br>투자 참고용 — 실제 투자 전 공식 출처를 반드시 확인하시기 바랍니다.`;
  document.getElementById('loadBox').style.display='none';
  document.getElementById('dash').style.display='block';
}

async function init(){
  try{
    const r=await fetch('./data.json?t='+Date.now());
    if(!r.ok)throw new Error('data.json not found');
    const d=await r.json();
    render(d);setBadge('b-live','Live');
  }catch(e){
    document.getElementById('loadBox').innerHTML=
      `<div style="font-size:22px;color:#ca8a04;margin-bottom:10px">⏳</div>
       <div style="font-size:14px;color:var(--tx);margin-bottom:8px">데이터 준비 중</div>
       <div style="font-size:12px;color:var(--t2);line-height:1.8">
         GitHub Actions가 처음 실행되면 데이터가 표시됩니다.<br>
         Actions 탭에서 <b>Run workflow</b>를 클릭해 수동 실행하세요.
       </div>`;
    setBadge('b-cache','No data yet');
  }
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
